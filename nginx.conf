events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml
               image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /app/dist;
        index index.html;

        # Cache static assets aggressively
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Cache HTML pages (shorter TTL for content freshness)
        location ~* \.html$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Clean URLs: try file, then file.html, then directory index
        location / {
            try_files $uri $uri.html $uri/ =404;
        }

        # Proxy 404s to Node.js admin API for dynamic handling
        error_page 404 = @api;
        
        location @api {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
